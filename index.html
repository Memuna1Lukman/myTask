<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
</head>
<body>
    <main>
        <div id="biggestDiv">
            <div id="leftSideDiv">
                <div id="leftTask">
                    <img src="#" alt="home-icon" id="img">
                    <h2 id="begin">myTask</h2>
                </div>
                <div id="smallNotes">
                    <div id="motivation">
                        <p class="doIt">Plan it.</p>
                        <p class="doIt">Do it</p>
                        <p class="doIt">Crush it</p>
                        <p id="notes">A task manager built sround the way you actually think-fast,flexible and visual</p>
                    </div>
                    <div id="checkboxes">
                        <input type="checkbox" class="marked" name="text"><label for="text">Design Homepage</label>
                        <input type="checkbox" class="marked" name="text"><label for="text">Set up auth flow</label>
                        <input type="checkbox"  class="unmarked" name="text"><label for="text">Build Dashboard UI</label>
                        <input type="checkbox" class="unmarked" name="text"><label for="text">Write Unit test</label>
                    </div>
                </div>
            </div>
            <div id="rightSideDiv">
                <div>
                    <h2 id="">Join myTask</h2>
                    <p>Get started -- it only takes a minutes</p>
                </div>
                <div id="form">
                    <form action="POST">
                        <label for="name" class="formData">Full name</label><input type="text" placeholder="john doe">
                        <label for="email" class="formData">Email Address</label><input type="email" placeholder="johndoe@gmail.com">
                        <label for="password" class="formData">Password<input type="password" placeholder="john">
                        <button id="createAccount">Create Account</button>    
                    </form>
                    <div id="hrLine">
                        <hr><p>sign up</p><hr>
                    </div>
                    <div id="media">
                        <div id="google">
                            <img src="" alt="google-logo">
                            <p class="mediafonts">Google</p>
 
                        </div>
                        <div id="apple">
                            <img src="" alt="apple-logo">
                            <p class="mediafonts">Apple</p>

                        </div>
                        <p>Already have an account? <a href="#" id="signIn">Sign in</a></p>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
