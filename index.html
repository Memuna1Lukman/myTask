



<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
</head>
<body>
    <main>
        <div id="biggestDiv">
            <div id="leftSideDiv">
                <div id="leftTask">
                    <img src="assets/menu.png" alt="home-icon" id="img" class="images">
                    <h2 id="begin">myTask</h2>
                </div>
                <div id="smallNotes">
                    <div id="motivation">
                        <p class="doIt">Plan it.</p>
                        <p class="doIt">Do it</p>
                        <p class="doIt">Crush it</p>
                        <p id="notes">A task manager built around the way <br> you actually think-fast,flexible and visual</p>
                    </div>
                    <div id="checkboxes">
                        <ul id="mark">
                            <li><input type="checkbox" class="marked marks" name="text"><label for="text">Design Homepage</label></li>
                            <li><input type="checkbox" class="marked marks" name="text"><label for="text">Set up auth flow</label></li>
                            <li><input type="checkbox"  class="unmarked marks" name="text"><label for="text">Build Dashboard UI</label></li>
                            <li><input type="checkbox" class="unmarked marks" name="text"><label for="text">Write Unit test</label></li>
                        </ul>    
                    </div>
                </div>
            </div>
            <div id="rightSideDiv">
                <div id="next">
                    <h2 class="hello">Join myTask</h2>
                    <p class="hello">Get started - it only takes a minutes</p>
                </div>
                <div id="form">
                    <form action="POST" id="formForm">
                        <div class="labels"><label for="name" class="formData">Full name</label><input type="text" placeholder="john doe" class="inputs"></div>
                        <div class="labels"><label for="email" class="formData">Email Address</label><input type="email" placeholder="johndoe@gmail.com" class="inputs"></div>
                        <div class="labels"><label for="password" class="formData">Password</label><input type="password" class="inputs"></div>
                        
                        <button id="createAccount" class="formData inputs">Create Account</button>    
                    </form>
                    <div id="hrLine">
                        <div class="line"></div>
                        <span>sign up</span>
                        <div class="line"></div>
                    </div>
                    <div id="media">
                        <div id="pngImg">
                            <img src="assets/google.png" alt="google-logo" class="medias">
                            <p class="mediafonts">Google</p>
                        </div>
                        <div id="pngImg1">
                            <img src="assets/apple.png" alt="apple-logo" class="medias">
                            <p class="mediafonts">Apple</p>
                        </div>
                        
                    </div>
                    <p>Already have an account? <a href="#" id="signIn">Sign in</a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
